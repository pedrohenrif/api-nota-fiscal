services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: tasy
      POSTGRES_PASSWORD: tasy
      POSTGRES_DB: tasy_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasy -d tasy_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  extractor-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Dentro do Docker, hosts internos substituem localhost do .env
      POSTGRES_URL: postgresql://tasy:tasy@db:5432/tasy_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ORACLE_CLIENT_LIB_DIR: /opt/oracle/instantclient_21_15
    ports:
      - "8001:8001"
    command: uvicorn services.extractor.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./:/app

  processor-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://tasy:tasy@db:5432/tasy_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8002:8002"
    command: uvicorn services.processor.main:app --host 0.0.0.0 --port 8002
    volumes:
      - ./:/app

  web-api-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      extractor-service:
        condition: service_started
    environment:
      POSTGRES_URL: postgresql://tasy:tasy@db:5432/tasy_db
      EXTRACTOR_URL: http://extractor-service:8001
    ports:
      - "8003:8003"
    command: uvicorn services.web_api.main:app --host 0.0.0.0 --port 8003
    volumes:
      - ./:/app

volumes:
  pgdata:
